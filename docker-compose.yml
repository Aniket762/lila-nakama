version: "3.8"

services:
  postgres:
    image: postgres:12.2-alpine
    container_name: nakama-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s   
    ports:
      - "5432:5432"
    restart: unless-stopped

  nakama:
    image: heroiclabs/nakama:3.17.0
    container_name: nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama \
          --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama \
          --logger.level DEBUG \
          --socket.server_key defaultkey \
          --runtime.js_entrypoint "logic.js"
    volumes:
      - nakama_data:/nakama/data
      - ./backend/build:/nakama/data/modules
    ports:
      - "7350:7350"
      - "7351:7351"
      - "7352:7352"
    restart: on-failure
volumes:
  postgres_data:
  nakama_data:
